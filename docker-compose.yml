version: '3.9'

services:
  db:
    image: postgis/postgis:15-3.4
    container_name: sorasmart-db
    environment:
      POSTGRES_DB: sorasmart
      POSTGRES_USER: sorasmart
      POSTGRES_PASSWORD: sorasmart
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
